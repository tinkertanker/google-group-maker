{% extends "base.html" %}

{% block title %}Create Group - Google Group Maker{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold text-gray-900">Create Group</h1>
        <p class="mt-1 text-sm text-gray-600">Create a new Google Group</p>
    </div>

    <form method="post" action="/groups" class="space-y-4 bg-white p-6 rounded-lg border border-gray-200">
        <div>
            <label for="group_name" class="block text-sm font-medium text-gray-700">Group Name</label>
            <div class="mt-1 flex rounded-md shadow-sm">
                <input
                    type="text"
                    name="group_name"
                    id="group_name"
                    required
                    placeholder="my-group"
                    class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-l-md focus:outline-none focus:ring-1 focus:ring-gray-400"
                >
                <span class="inline-flex items-center px-3 text-sm text-gray-500 bg-gray-50 border border-l-0 border-gray-300 rounded-r-md">
                    @{{ default_domain }}
                </span>
            </div>
            <p class="mt-1 text-xs text-gray-500">Letters, numbers, hyphens, and underscores only</p>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
            <textarea
                name="description"
                id="description"
                rows="2"
                placeholder="Optional description"
                class="mt-1 w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400"
            ></textarea>
        </div>

        <div>
            <label for="trainer_emails" class="block text-sm font-medium text-gray-700">Initial Members</label>
            <textarea
                name="trainer_emails"
                id="trainer_emails"
                rows="3"
                placeholder="email@example.com&#10;another@example.com"
                class="mt-1 w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400"
            ></textarea>
            <p class="mt-1 text-xs text-gray-500">One email per line or comma-separated</p>
        </div>

        <div class="flex items-center">
            <input
                type="checkbox"
                name="add_self"
                id="add_self"
                value="true"
                class="h-4 w-4 text-gray-900 focus:ring-gray-500 border-gray-300 rounded"
            >
            <label for="add_self" class="ml-2 text-sm text-gray-700">Add myself to group</label>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-gray-900 rounded-md hover:bg-gray-800">
                Create Group
            </button>
            <a href="/groups" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
