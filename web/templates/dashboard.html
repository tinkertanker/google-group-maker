{% extends "base.html" %}

{% block title %}Dashboard - Google Group Maker{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-semibold text-gray-900">Dashboard</h1>
        <p class="mt-1 text-gray-600">Welcome, {{ user.name or user.email }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Create Group Card -->
        <a href="/groups/new" class="block p-6 bg-white rounded-lg border border-gray-200 hover:border-gray-300 hover:shadow-sm transition">
            <h2 class="text-lg font-medium text-gray-900">Create Group</h2>
            <p class="mt-1 text-sm text-gray-600">Create a new Google Group and add members</p>
        </a>

        <!-- List Groups Card -->
        <a href="/groups" class="block p-6 bg-white rounded-lg border border-gray-200 hover:border-gray-300 hover:shadow-sm transition">
            <h2 class="text-lg font-medium text-gray-900">Manage Groups</h2>
            <p class="mt-1 text-sm text-gray-600">View, search, and manage existing groups</p>
        </a>
    </div>
</div>
{% endblock %}
