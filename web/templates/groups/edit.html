{% extends "base.html" %}

{% block title %}Edit {{ group.email }}{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="mb-6">
        <a href="/groups/{{ group.email }}/members" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back to group</a>
        <h1 class="text-2xl font-semibold text-gray-900 mt-1">Edit Group</h1>
        <p class="text-sm text-gray-600">{{ group.email }}</p>
    </div>

    <form method="post" action="/groups/{{ group.email }}/rename" class="space-y-4 bg-white p-6 rounded-lg border border-gray-200">
        <div>
            <label for="new_name" class="block text-sm font-medium text-gray-700">New Group Name</label>
            <input
                type="text"
                name="new_name"
                id="new_name"
                required
                value="{{ group.name }}"
                class="mt-1 w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-400"
            >
            <p class="mt-1 text-xs text-gray-500">
                This will change the group's email address to new-name@{{ group.email.split('@')[1] }}
            </p>
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-gray-900 rounded-md hover:bg-gray-800">
                Rename Group
            </button>
            <a href="/groups/{{ group.email }}/members" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
